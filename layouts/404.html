<!doctype html>
<html lang="{{ site.Language.Lang | default "en" }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Page not found | {{ site.Title }}</title>
  <script>
    (function () {
      var preference = localStorage.getItem("pref-theme");
      var theme = preference || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
      document.documentElement.dataset.theme = theme;
    })();
  </script>
  <style>
    :root {
      color-scheme: light;
      --theme: rgb(255, 255, 255);
      --entry: rgb(255, 255, 255);
      --primary: rgb(30, 30, 30);
      --secondary: rgb(108, 108, 108);
      --border: rgb(238, 238, 238);
      --link: rgb(30, 30, 30);
    }

    html[data-theme="dark"] {
      color-scheme: dark;
      --theme: rgb(29, 30, 32);
      --entry: rgb(46, 46, 51);
      --primary: rgb(218, 218, 219);
      --secondary: rgb(155, 156, 157);
      --border: rgb(51, 51, 51);
      --link: rgb(218, 218, 219);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--theme);
      color: var(--primary);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    main {
      width: min(100%, 520px);
      padding: 32px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--entry);
      text-align: center;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 8vw, 4rem);
      line-height: 1;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 24px;
      color: var(--secondary);
      font-size: 1rem;
    }

    a {
      color: var(--link);
      text-underline-offset: 4px;
    }
  </style>
</head>
<body>
  <main>
    <h1>404</h1>
    <p>Page not found.</p>
    <a href="{{ "/" | absURL }}" onclick="event.preventDefault(); window.location.assign(window.location.origin + '/');">Back to home</a>
  </main>
</body>
</html>
