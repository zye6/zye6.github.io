baseURL = '/'
languageCode = 'en-us'
title = "tim.ye blog"
theme = "PaperMod"
relativeURLs = true
disableKinds = ["taxonomy", "term", "RSS", "sitemap"]

[params]
  description = 'Personal blog built with Hugo and PaperMod'
  author = "tim.ye"
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  defaultTheme = "auto"

  [params.homeInfoParams]
    Title = "Welcome to my blog."
    Content = "where old memories meet new adventures."

[markup]
  [markup.highlight]
    noClasses = false
